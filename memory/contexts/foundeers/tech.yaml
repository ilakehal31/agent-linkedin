stack:
  description: "Stack technique de Foundeers — ce qu'on utilise pour builder les MVP"

  frontend:
    framework: "Vue.js 3"
    meta_framework: "Nuxt 3"
    points_forts:
      - "SSR + SSG pour le SEO et la performance"
      - "DX excellente — les agences non-tech comprennent le code"
      - "Écosystème riche (VueUse, Pinia, Nuxt UI)"
    pourquoi: "Nuxt permet de livrer vite, le code reste maintenable, et les clients peuvent itérer sans nous"

  backend:
    framework: "Nitro"
    points_forts:
      - "Server routes intégrées à Nuxt — pas besoin de backend séparé"
      - "Deploy anywhere (Vercel, Netlify, AWS, self-hosted)"
      - "API rapide à prototyper"
    pourquoi: "Un seul repo, un seul deploy — parfait pour des MVP qui doivent sortir vite"

  principes:
    - "Monorepo Nuxt — frontend + API dans le même projet"
    - "Pas de micro-services pour un MVP — un serveur, une base, c'est tout"
    - "Design system dès le jour 1 (Nuxt UI / composants réutilisables)"
    - "TypeScript partout — moins de bugs, plus de confiance"
    - "Deploy en continu — chaque push va en prod"

opinions_tech:
  - opinion: "Le no-code c'est bien pour un POC, pas pour un SaaS"
    argument: "Au-delà de 50 utilisateurs, les limites arrivent vite — perf, custom, intégrations"
    utilisable_pour: "Posts TOFU controversés, débats no-code vs code"

  - opinion: "Un MVP n'a pas besoin de plus de 3-4 features core"
    argument: "Chaque feature ajoutée retarde le lancement et dilue la proposition de valeur"
    utilisable_pour: "Posts MOFU sur la priorisation produit"

  - opinion: "Vue/Nuxt est sous-coté face à React/Next"
    argument: "Moins de hype mais meilleure DX, courbe d'apprentissage plus douce, parfait pour des équipes réduites"
    utilisable_pour: "Posts TOFU tech, débats framework"

  - opinion: "Le serverless a changé la donne pour les MVP"
    argument: "Plus besoin de gérer des serveurs, le coût au démarrage est quasi nul"
    utilisable_pour: "Posts MOFU sur les coûts de dev"

vocabulaire_tech_accessible:
  description: "Comment parler tech à des non-techs (fondateurs d'agences)"
  traductions:
    - technique: "SSR (Server-Side Rendering)"
      accessible: "Le site se charge instantanément et Google le référence bien"
    - technique: "API / Server routes"
      accessible: "La partie du logiciel qui fait le travail en coulisses"
    - technique: "TypeScript"
      accessible: "Un filet de sécurité qui évite les bugs avant qu'ils arrivent"
    - technique: "CI/CD"
      accessible: "Chaque amélioration est mise en ligne automatiquement"
    - technique: "Design system"
      accessible: "Une bibliothèque de composants réutilisables — comme des Lego"
