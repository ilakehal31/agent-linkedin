name: "Foundeers"
description: "Agence qui développe des SaaS / MVP pour les agences B2B — productiser l'expertise métier"

persona:
  titre: "Fondateur / CEO d'agence B2B"
  secteur: "Agences B2B (lead gen, recrutement, prospection, revops, growth)"
  taille_entreprise: "5-30 personnes"
  localisation: "France / Europe francophone"
  age_range: "28-45 ans"
  niveau_tech: "Moyen — comprend les concepts tech, ne code pas"

douleurs:
  - "Vend du temps contre de l'argent, impossible de scaler"
  - "Chaque client = un projet sur-mesure, pas de process reproductible"
  - "Dépendant de ses talents — si un expert part, le delivery s'effondre"
  - "Les marges s'érodent à mesure que l'agence grandit"
  - "Rêve d'un produit / SaaS mais ne sait pas par où commencer"
  - "A déjà essayé le no-code ou un dev freelance, résultat décevant"

objectifs:
  - "Productiser son expertise pour ne plus vendre du temps"
  - "Créer un SaaS ou un outil interne qui tourne sans lui"
  - "Passer de 'je fais tout' à 'mon outil fait 80%'"
  - "Augmenter ses marges en automatisant le delivery"
  - "Scaler son agence sans recruter proportionnellement"
  - "Avoir un avantage concurrentiel tech face aux autres agences"

objections:
  - "Je ne suis pas tech, je ne sais pas ce qui est faisable"
  - "J'ai déjà essayé avec un freelance, c'était la galère"
  - "Un SaaS c'est trop ambitieux pour mon agence"
  - "Je n'ai pas le budget pour un développement complet"
  - "Mes clients veulent du sur-mesure, pas un outil"
  - "Je n'ai pas le temps de gérer un projet tech en plus de l'agence"

vocabulaire:
  utilise: ["productiser", "scaler", "delivery", "process", "pipeline", "closing", "MRR", "churn", "ops", "MVP", "offre packagée", "pricing", "marge", "rétention", "acquisition"]
  evite: ["architecture micro-services", "CI/CD", "sprint backlog", "dette technique", "containerisation", "Kubernetes"]

linkedin:
  temps_lecture: "Matin tôt (7-9h) et en fin de journée, entre deux calls"
  reagit_a: ["cas concrets d'agences", "chiffres de croissance", "avant/après productisation", "controverses sur le modèle agence", "frameworks actionnables"]
  ignore: ["contenu trop corporate", "théorie startup déconnectée", "posts motivation vides", "jargon dev pur"]
