description: "Les thèmes récurrents autour desquels tourne le contenu Foundeers"

pillars:
  - name: "Productisation"
    description: "Passer de service sur-mesure à offre scalable / SaaS"
    exemples_sujets:
      - "Les 3 signaux qui montrent que ton agence est prête à productiser"
      - "Service vs Produit : pourquoi les agences qui scalent font les deux"
      - "Comment transformer un process interne en offre payante"
      - "L'erreur #1 des agences qui essaient de productiser"

  - name: "MVP & Tech"
    description: "Construire un produit rapidement sans être dev"
    exemples_sujets:
      - "No-code vs code : le vrai comparatif pour une agence B2B"
      - "Combien coûte vraiment un MVP en 2026"
      - "Les 5 features dont ton MVP n'a PAS besoin au lancement"
      - "Comment briefer un dev quand tu n'es pas technique"

  - name: "Growth Agences B2B"
    description: "Scaling, pricing, acquisition et rétention pour agences"
    exemples_sujets:
      - "Comment passer de 10K à 50K MRR avec une agence B2B"
      - "Pricing agence : pourquoi tes marges fondent et comment fixer ça"
      - "Les 3 leviers pour scaler sans recruter"
      - "Rétention client : ce que les meilleures agences font différemment"

  - name: "Coulisses Foundeers"
    description: "Humaniser la marque — les galères, les victoires, le quotidien"
    exemples_sujets:
      - "Ce qu'on a appris en buildant 10 MVP pour des agences"
      - "Un projet qui a foiré et ce qu'on en a tiré"
      - "Pourquoi on a choisi de se spécialiser sur les agences B2B"

  - name: "Résultats & Case studies"
    description: "Prouver avec des résultats concrets de clients"
    exemples_sujets:
      - "Comment [agence] a doublé ses marges en productisant son delivery"
      - "De 0 à 30 clients en 3 mois avec un MVP à 15K€"
      - "Avant/après : une agence de lead gen qui a automatisé 80% de son process"

  - name: "Tendances & Veille"
    description: "Se positionner comme veilleur du secteur agences + tech"
    exemples_sujets:
      - "L'IA va tuer les agences B2B ? Mon avis."
      - "Les 3 tendances qui redéfinissent le modèle agence en 2026"
      - "Pourquoi les agences deviennent des boîtes de produit"

frequence_recommandee:
  posts_par_semaine: 4
  distribution: "1 productisation + 1 growth/MVP + 1 coulisses/résultats + 1 tendances"
