parcours:
  resume: "Dev Vue.js/Laravel en alternance pendant 2 ans, puis chef de projet digital dans la proptech, puis co-fondateur de Foundeers. Passé du code pur à la stratégie produit. Comprend les deux côtés — la technique et le business."
  etapes:
    - date: "2021-2023"
      quoi: "Développeur Laravel/Vue.js en alternance chez Komeet (ex Vendredi/Wenabi)"
      lecon: "2 ans à coder sur du frontend et du backend. C'est là que j'ai appris Vue.js à fond et que j'ai compris comment fonctionne un produit de l'intérieur."
    - date: "2023-2025"
      quoi: "Chef de projet digital chez Roof (proptech, coliving)"
      lecon: "J'ai pris en charge toute la partie technique d'une boîte — de la conception à la prod. Gestion d'un parc de ~20 résidences, apps internes (ops, finance, onboarding). C'est là que j'ai compris que la vraie valeur c'est pas le code, c'est le produit qui résout un problème."
    - date: "sept. 2025"
      quoi: "Co-fondation de Foundeers"
      lecon: "On a vu que les agences B2B avaient toutes le même problème : elles vendent du temps, pas un produit. On a décidé de les aider à productiser leur expertise en SaaS/MVP."

